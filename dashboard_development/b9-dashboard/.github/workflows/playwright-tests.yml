name: Playwright E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  test:
    name: Playwright Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        # Test across multiple Node versions
        node-version: [20.x]
        # Test different browser combinations
        browser: [chromium, firefox, webkit]
        
    steps:
    - uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Cache node modules
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-
          
    - name: Install dependencies
      run: npm ci
      
    - name: Setup environment variables
      run: |
        echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" >> .env.local
        echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> .env.local
        echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env.local
        echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env.local
        echo "PLAYWRIGHT_BASE_URL=http://localhost:3000" >> .env.local
        
    - name: Install Playwright browsers
      run: npx playwright install --with-deps ${{ matrix.browser }}
      
    - name: Build application
      run: npm run build
      
    - name: Run E2E tests
      run: npx playwright test --project=${{ matrix.browser }}
      env:
        CI: true
        PLAYWRIGHT_BROWSER: ${{ matrix.browser }}
        
    - name: Run performance tests
      run: npx playwright test --project=performance
      if: matrix.browser == 'chromium'  # Only run performance tests on Chromium
      
    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: playwright-report-${{ matrix.browser }}-${{ matrix.node-version }}
        path: playwright-report/
        retention-days: 30
        
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.browser }}-${{ matrix.node-version }}
        path: test-results/
        retention-days: 30
        
    - name: Upload screenshots
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: screenshots-${{ matrix.browser }}-${{ matrix.node-version }}
        path: test-results/screenshots/
        retention-days: 7

  visual-regression:
    name: Visual Regression Tests
    timeout-minutes: 30
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Setup environment variables
      run: |
        echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" >> .env.local
        echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> .env.local
        echo "PLAYWRIGHT_BASE_URL=http://localhost:3000" >> .env.local
        
    - name: Install Playwright
      run: npx playwright install --with-deps chromium
      
    - name: Build application
      run: npm run build
      
    - name: Run visual regression tests
      run: npx playwright test tests/visual/ --project=chromium
      
    - name: Upload visual diff artifacts
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: visual-regression-diffs
        path: test-results/
        retention-days: 30

  mobile-tests:
    name: Mobile Device Tests
    timeout-minutes: 30
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        device: [mobile-chrome, mobile-safari]
        
    steps:
    - uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Setup environment variables
      run: |
        echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" >> .env.local
        echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> .env.local
        echo "PLAYWRIGHT_BASE_URL=http://localhost:3000" >> .env.local
        
    - name: Install Playwright browsers
      run: npx playwright install --with-deps
      
    - name: Build application
      run: npm run build
      
    - name: Run mobile tests
      run: npx playwright test --project=${{ matrix.device }}
      
    - name: Upload mobile test results
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: mobile-test-results-${{ matrix.device }}
        path: test-results/
        retention-days: 7

  accessibility-tests:
    name: Accessibility Tests
    timeout-minutes: 20
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: |
        npm ci
        npm install --save-dev @axe-core/playwright
        
    - name: Setup environment variables
      run: |
        echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" >> .env.local
        echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> .env.local
        echo "PLAYWRIGHT_BASE_URL=http://localhost:3000" >> .env.local
        
    - name: Install Playwright
      run: npx playwright install --with-deps chromium
      
    - name: Build application
      run: npm run build
      
    - name: Run accessibility tests
      run: npx playwright test tests/accessibility/ --project=chromium
      
    - name: Upload accessibility results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: accessibility-results
        path: test-results/
        retention-days: 30

  test-summary:
    name: Test Summary
    needs: [test, visual-regression, mobile-tests, accessibility-tests]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      
    - name: Generate test summary
      run: |
        echo "# Test Results Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ needs.test.result }}" = "success" ]; then
          echo "✅ **E2E Tests**: Passed" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **E2E Tests**: Failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ "${{ needs.visual-regression.result }}" = "success" ]; then
          echo "✅ **Visual Regression**: Passed" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Visual Regression**: Failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ "${{ needs.mobile-tests.result }}" = "success" ]; then
          echo "✅ **Mobile Tests**: Passed" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Mobile Tests**: Failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ "${{ needs.accessibility-tests.result }}" = "success" ]; then
          echo "✅ **Accessibility Tests**: Passed" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Accessibility Tests**: Failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- [Test Reports](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
        
    - name: Comment on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const testStatus = {
            e2e: '${{ needs.test.result }}' === 'success' ? '✅' : '❌',
            visual: '${{ needs.visual-regression.result }}' === 'success' ? '✅' : '❌',
            mobile: '${{ needs.mobile-tests.result }}' === 'success' ? '✅' : '❌',
            accessibility: '${{ needs.accessibility-tests.result }}' === 'success' ? '✅' : '❌'
          };
          
          const comment = `## 🧪 Test Results
          
          | Test Suite | Status |
          |------------|--------|
          | E2E Tests | ${testStatus.e2e} |
          | Visual Regression | ${testStatus.visual} |
          | Mobile Tests | ${testStatus.mobile} |
          | Accessibility | ${testStatus.accessibility} |
          
          View detailed results in the [Actions tab](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).
          `;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

  deploy-preview:
    name: Deploy Test Preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build application
      run: npm run build
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        
    - name: Deploy to Vercel Preview
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: ./