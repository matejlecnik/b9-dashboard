name: 🚀 Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # Security and dependency scan
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🛡️ Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: 📊 Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Automated testing pipeline
  test:
    name: 🧪 Test & Validate
    runs-on: ubuntu-latest
    needs: security
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: dashboard_development/b9-dashboard/package-lock.json

      - name: 📋 Validate Node.js version
        run: |
          cd dashboard_development/b9-dashboard
          node --version
          npm --version
          
      - name: 🔧 Install dependencies
        run: |
          cd dashboard_development/b9-dashboard
          npm ci --prefer-offline --no-audit

      - name: 🔍 Type checking with TypeScript
        run: |
          cd dashboard_development/b9-dashboard
          npx tsc --noEmit

      - name: 🧹 Run ESLint
        run: |
          cd dashboard_development/b9-dashboard
          npm run lint

      - name: 🏗️ Build application
        run: |
          cd dashboard_development/b9-dashboard
          npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: 📊 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: dashboard_development/b9-dashboard/.next
          retention-days: 1

  # Deploy to Vercel Preview (for PRs)
  deploy-preview:
    name: 🔍 Deploy Preview
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: dashboard_development/b9-dashboard/package-lock.json

      - name: 🔧 Install Vercel CLI
        run: npm install --global vercel@latest

      - name: 🔗 Pull Vercel Environment Information
        run: |
          cd dashboard_development/b9-dashboard
          vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🏗️ Build Project Artifacts
        run: |
          cd dashboard_development/b9-dashboard
          vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🚀 Deploy to Vercel Preview
        id: deploy-preview
        run: |
          cd dashboard_development/b9-dashboard
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview-url=$url" >> $GITHUB_OUTPUT

      - name: 💬 Comment Preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && comment.body.includes('🔍 Preview Deployment')
            );
            
            const body = `🔍 **Preview Deployment Ready**
            
            ✅ Your preview deployment is ready! 
            
            **Preview URL**: ${{ steps.deploy-preview.outputs.preview-url }}
            
            Changes will be automatically deployed on each push to this PR.
            `;
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

  # Deploy to Production (main branch only)
  deploy-production:
    name: 🌟 Deploy Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: dashboard_development/b9-dashboard/package-lock.json

      - name: 🔧 Install Vercel CLI
        run: npm install --global vercel@latest

      - name: 🔗 Pull Vercel Environment Information
        run: |
          cd dashboard_development/b9-dashboard
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🏗️ Build Project Artifacts
        run: |
          cd dashboard_development/b9-dashboard
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🚀 Deploy to Vercel Production
        id: deploy
        run: |
          cd dashboard_development/b9-dashboard
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT

      - name: 🎉 Deployment Success Notification
        run: |
          echo "🎉 Production deployment successful!"
          echo "URL: ${{ steps.deploy.outputs.url }}"

  # Health Check after deployment
  health-check:
    name: 🏥 Health Check
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: 🔍 Wait for deployment to be ready
        run: sleep 30

      - name: 🏥 Check application health
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" ${{ needs.deploy-production.outputs.url }})
          if [ $response -eq 200 ]; then
            echo "✅ Health check passed! Application is responding correctly."
          else
            echo "❌ Health check failed! HTTP status: $response"
            exit 1
          fi

      - name: 🚨 Notify on health check failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Production Health Check Failed',
              body: `Production deployment health check failed after commit ${context.sha}.
              
              **Deployment URL**: ${{ needs.deploy-production.outputs.url }}
              **Commit**: ${context.sha}
              **Workflow**: [${context.workflow}](${context.server_url}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
              
              Please investigate and rollback if necessary.`,
              labels: ['bug', 'production', 'urgent']
            });

  # Rollback capability (manual trigger)
  rollback:
    name: 🔄 Rollback Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: production
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Install Vercel CLI
        run: npm install --global vercel@latest

      - name: 🔄 Rollback to previous deployment
        run: |
          cd dashboard_development/b9-dashboard
          vercel rollback --token=${{ secrets.VERCEL_TOKEN }} --yes

      - name: 📢 Rollback notification
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔄 Production Rollback Executed',
              body: `Production has been rolled back to the previous deployment.
              
              **Triggered by**: @${context.actor}
              **Commit**: ${context.sha}
              **Workflow**: [${context.workflow}](${context.server_url}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
              
              Please verify the application is working correctly.`,
              labels: ['deployment', 'rollback', 'production']
            });