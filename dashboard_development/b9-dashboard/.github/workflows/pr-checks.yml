name: ✅ Pull Request Checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  # Skip if draft PR
  skip-draft:
    name: 🚧 Skip Draft PRs
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == true
    steps:
      - name: 📝 Skip draft PR
        run: echo "Skipping checks for draft PR"

  # Validate PR structure and requirements
  pr-validation:
    name: 🔍 PR Validation
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📏 Check PR title format
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const validPrefixes = ['feat:', 'fix:', 'docs:', 'style:', 'refactor:', 'test:', 'chore:', 'perf:', 'ci:'];
            
            if (!validPrefixes.some(prefix => title.startsWith(prefix))) {
              core.setFailed(`PR title must start with one of: ${validPrefixes.join(', ')}`);
            }

      - name: 📝 Check PR description
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body;
            if (!body || body.length < 10) {
              core.setFailed('PR must include a meaningful description');
            }

      - name: 📊 Check changed files
        run: |
          changed_files=$(git diff --name-only origin/main...HEAD)
          echo "Changed files:"
          echo "$changed_files"
          
          # Check if any TypeScript/JavaScript files changed
          if echo "$changed_files" | grep -E '\.(ts|tsx|js|jsx)$'; then
            echo "✅ Source code changes detected - full pipeline will run"
          else
            echo "ℹ️ No source code changes - limited pipeline will run"
          fi

      - name: 🚨 Block direct main commits
        run: |
          if [ "${{ github.event.pull_request.head.ref }}" == "main" ]; then
            echo "❌ Direct commits to main branch are not allowed"
            exit 1
          fi

  # Code quality checks
  code-quality:
    name: 🎯 Code Quality
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    needs: pr-validation
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard_development/b9-dashboard/package-lock.json

      - name: 🔧 Install dependencies
        run: |
          cd dashboard_development/b9-dashboard
          npm ci --prefer-offline --no-audit

      - name: 🔍 Run TypeScript checks on changed files
        run: |
          cd dashboard_development/b9-dashboard
          changed_ts_files=$(git diff --name-only origin/main...HEAD -- '*.ts' '*.tsx' || true)
          if [ -n "$changed_ts_files" ]; then
            echo "Checking TypeScript files: $changed_ts_files"
            npx tsc --noEmit
          else
            echo "No TypeScript files changed"
          fi

      - name: 🧹 Run ESLint on changed files
        run: |
          cd dashboard_development/b9-dashboard
          changed_files=$(git diff --name-only origin/main...HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' || true)
          if [ -n "$changed_files" ]; then
            echo "Linting files: $changed_files"
            echo "$changed_files" | xargs npx eslint --max-warnings 0
          else
            echo "No JavaScript/TypeScript files changed"
          fi

      - name: 📊 Generate diff summary
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            
            try {
              const diffStats = execSync('git diff --stat origin/main...HEAD', { encoding: 'utf8' });
              const diffNumstat = execSync('git diff --numstat origin/main...HEAD', { encoding: 'utf8' });
              
              const lines = diffNumstat.split('\n').filter(line => line.length > 0);
              let totalAdded = 0, totalRemoved = 0;
              
              lines.forEach(line => {
                const [added, removed] = line.split('\t');
                if (added !== '-') totalAdded += parseInt(added) || 0;
                if (removed !== '-') totalRemoved += parseInt(removed) || 0;
              });
              
              const summary = `📊 **Code Changes Summary**
              
              \`\`\`
              ${diffStats}
              \`\`\`
              
              **Total changes**: +${totalAdded} -${totalRemoved} lines
              **Files changed**: ${lines.length}
              `;
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: summary
              });
            } catch (error) {
              console.log('Could not generate diff summary:', error.message);
            }

  # Security and dependency checks
  security-check:
    name: 🔒 Security Check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    needs: pr-validation
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard_development/b9-dashboard/package-lock.json

      - name: 🔧 Install dependencies
        run: |
          cd dashboard_development/b9-dashboard
          npm ci --prefer-offline --no-audit

      - name: 🛡️ Run security audit
        run: |
          cd dashboard_development/b9-dashboard
          npm audit --audit-level=moderate

      - name: 🔍 Check for sensitive files
        run: |
          sensitive_patterns=(".env" "*.key" "*.pem" "*.p12" "*.pfx" "id_rsa" "id_dsa")
          found_sensitive=false
          
          for pattern in "${sensitive_patterns[@]}"; do
            if git ls-files | grep -E "$pattern"; then
              echo "❌ Sensitive file found: $pattern"
              found_sensitive=true
            fi
          done
          
          if [ "$found_sensitive" = true ]; then
            echo "❌ Sensitive files detected in repository"
            exit 1
          else
            echo "✅ No sensitive files found"
          fi

      - name: 🔍 Check for hardcoded secrets
        run: |
          # Check for common secret patterns
          if git diff origin/main...HEAD | grep -E "(password|secret|token|key)\s*=\s*['\"][^'\"]{8,}['\"]"; then
            echo "❌ Possible hardcoded secrets found in diff"
            echo "Please use environment variables for sensitive data"
            exit 1
          else
            echo "✅ No hardcoded secrets detected"
          fi

  # Performance impact assessment
  performance-check:
    name: ⚡ Performance Check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    needs: [pr-validation, code-quality]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard_development/b9-dashboard/package-lock.json

      - name: 🔧 Install dependencies
        run: |
          cd dashboard_development/b9-dashboard
          npm ci --prefer-offline --no-audit

      - name: 📏 Check bundle size impact
        run: |
          cd dashboard_development/b9-dashboard
          
          # Build current branch
          npm run build
          current_size=$(du -sb .next 2>/dev/null | cut -f1 || echo "0")
          
          # Switch to main and build
          git fetch origin main
          git checkout origin/main
          npm ci --prefer-offline --no-audit
          npm run build
          main_size=$(du -sb .next 2>/dev/null | cut -f1 || echo "0")
          
          # Calculate difference
          size_diff=$((current_size - main_size))
          size_diff_mb=$((size_diff / 1024 / 1024))
          
          echo "Build size comparison:"
          echo "Main branch: $(numfmt --to=iec-i --suffix=B $main_size)"
          echo "Current branch: $(numfmt --to=iec-i --suffix=B $current_size)"
          echo "Difference: $(numfmt --to=iec-i --suffix=B $size_diff)"
          
          # Warn if bundle size increased significantly
          if [ $size_diff_mb -gt 5 ]; then
            echo "⚠️ Warning: Bundle size increased by more than 5MB"
            echo "Please review if this increase is necessary"
          elif [ $size_diff_mb -gt 10 ]; then
            echo "❌ Error: Bundle size increased by more than 10MB"
            echo "This is likely too large and should be optimized"
            exit 1
          fi
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  # Final PR status check
  pr-ready:
    name: 🎯 PR Ready
    runs-on: ubuntu-latest
    needs: [code-quality, security-check, performance-check]
    if: github.event.pull_request.draft == false
    
    steps:
      - name: ✅ All checks passed
        run: |
          echo "🎉 All PR checks passed!"
          echo "This PR is ready for review and merge."

      - name: 🏷️ Add ready label
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['ready-for-review']
            });